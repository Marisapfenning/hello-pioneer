<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello from Pioneer Species</title>
  <style>
    body { font-family: system-ui, sans-serif; text-align: center; margin-top: 4rem; }
    #confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <h1>hello from Pioneer Species</h1>
  <p style="color: deeppink;">you're so cool!</p>

  <canvas id="confetti"></canvas>

  <script>
    // Only celebrate on the very first visit.
    if (!localStorage.getItem('confettiShown')) {
      localStorage.setItem('confettiShown', 'true');
      launchConfetti();
    }

    function launchConfetti() {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      let width, height;

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      const colors = ['#ff69b4', '#ffd700', '#7cffcb', '#6ec1ff', '#c084fc', '#ff8a5c'];
      const pieces = [];
      const PIECE_COUNT = 150;

      for (let i = 0; i < PIECE_COUNT; i++) {
        pieces.push({
          x: Math.random() * width,
          y: Math.random() * -height,          // start above the top, staggered
          size: 6 + Math.random() * 8,
          color: colors[Math.floor(Math.random() * colors.length)],
          speedY: 0.6 + Math.random() * 1.2,    // slow, gentle fall
          drift: -0.6 + Math.random() * 1.2,    // gentle side-to-side sway
          angle: Math.random() * Math.PI * 2,
          spin: -0.05 + Math.random() * 0.1,
          swayPhase: Math.random() * Math.PI * 2
        });
      }

      const startTime = performance.now();
      const DURATION = 9000; // confetti gracefully finishes after ~9s

      function draw(now) {
        ctx.clearRect(0, 0, width, height);
        const elapsed = now - startTime;

        for (const p of pieces) {
          p.swayPhase += 0.02;
          p.x += p.drift + Math.sin(p.swayPhase) * 0.6;
          p.y += p.speedY;
          p.angle += p.spin;

          // Recycle pieces back to the top while the show lasts.
          if (p.y > height + 20 && elapsed < DURATION - 1500) {
            p.y = -20;
            p.x = Math.random() * width;
          }

          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.angle);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
          ctx.restore();
        }

        if (elapsed < DURATION) {
          requestAnimationFrame(draw);
        } else {
          ctx.clearRect(0, 0, width, height);
        }
      }

      requestAnimationFrame(draw);
    }
  </script>
</body>
</html>
